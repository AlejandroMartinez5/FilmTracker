openapi: 3.0.3
info:
  title: ReelTrack Moderation API
  version: 1.0.0
  description: Contrato OpenAPI del microservicio de moderacion.
servers:
  - url: http://localhost:3007
    description: Local ms-moderation
tags:
  - name: Moderation
paths:
