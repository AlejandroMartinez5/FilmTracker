    $ref: "../../docs/openapi.yaml#/paths/~1api~1comments~1{commentId}~1image"
  /api/comments/{commentId}/like:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1comments~1{commentId}~1like"
  /api/comments/{commentId}/likes:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1comments~1{commentId}~1likes"
  /api/leaderboards/users:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1leaderboards~1users"
  /api/leaderboards/reviews:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1leaderboards~1reviews"
  /api/leaderboards/comments:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1leaderboards~1comments"
components:
  securitySchemes:
    bearerAuth:
      $ref: "../../docs/openapi.yaml#/components/securitySchemes/bearerAuth"
