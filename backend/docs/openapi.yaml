        "200":
          $ref: "#/components/responses/MessageResponse"

  /health:
    get:
      tags: [Media]
      summary: Verifica el estado del servicio HTTP donde aplique.
      responses:
        "200":
          $ref: "#/components/responses/MessageResponse"
  /media/{fileName}:
    get:
      tags: [Media]
      summary: Sirve un archivo estatico subido por ms-media.
      parameters:
        - name: fileName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Archivo multimedia.
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Archivo no encontrado.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AuthId:
      name: authId
      in: path
      required: true
      schema:
        type: string
    TvmazeId:
      name: tvmazeId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ReviewId:
      name: reviewId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    RequestId:
      name: requestId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    NotificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    SeasonNumber:
      name: seasonNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    SearchQuery:
      name: q
      in: query
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageLimit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
  requestBodies:
    EmailBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email:
                type: string
                format: email
    EmailCodeBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, code]
            properties:
              email:
                type: string
                format: email
              code:
                type: string
    ReasonBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              reason:
                type: string
    TvmazeBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [tvmazeId]
            properties:
              tvmazeId:
                type: integer
                minimum: 1
    ImageUploadBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [image]
            properties:
              image:
                type: string
                format: binary
  responses:
    MessageResponse:
      description: Respuesta con mensaje.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageEnvelope"
    DataResponse:
      description: Respuesta con mensaje y data.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DataEnvelope"
    PaginatedDataResponse:
      description: Respuesta paginada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaginatedDataEnvelope"
    GenericObjectResponse:
      description: Objeto JSON.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    ErrorResponse:
      description: Error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EpisodeListResponse:
      description: Lista de episodios.
      content:
        application/json:
          schema:
            type: object
            properties:
              tvmazeId:
                type: integer
              episodes:
                type: array
                items:
                  $ref: "#/components/schemas/Episode"
    ReviewsPageResponse:
      description: Resenas paginadas.
      content:
        application/json:
          schema:
            type: object
            properties:
              reviews:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
              pagination:
                $ref: "#/components/schemas/Pagination"
    ReviewObjectResponse:
      description: Resena.
      content:
        application/json:
          schema:
            type: object
            properties:
              review:
                $ref: "#/components/schemas/Review"
              message:
                type: string
    CommentObjectResponse:
      description: Comentario.
      content:
        application/json:
          schema:
            type: object
            properties:
              comment:
                $ref: "#/components/schemas/Comment"
              message:
                type: string
  schemas:
    MessageEnvelope:
      type: object
      properties:
        message:
          type: string
    DataEnvelope:
      allOf:
        - $ref: "#/components/schemas/MessageEnvelope"
        - type: object
          properties:
            data:
              type: object
              nullable: true
              additionalProperties: true
    PaginatedDataEnvelope:
      type: object
      properties:
        message:
          type: string
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: "#/components/schemas/Pagination"
    Error:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
        data:
          nullable: true
          additionalProperties: true
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    RegisterRequest:
      type: object
      required: [email, password, name, username]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
          minLength: 2
          maxLength: 40
        username:
          type: string
          minLength: 3
          maxLength: 30
        profileImage:
          type: string
          format: uri
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        token:
          type: string
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        accountStatus:
          type: string
          enum: [ACTIVE, SUSPENDED, BANNED]
        emailVerified:
          type: boolean
    Show:
      type: object
      properties:
        tvmazeId:
          type: integer
        name:
          type: string
        type:
          type: string
        language:
          type: string
        genres:
          type: array
          items:
            type: string
        status:
          type: string
        runtime:
          type: integer
          nullable: true
        averageRuntime:
          type: integer
          nullable: true
        premiered:
          type: string
          nullable: true
        ended:
          type: string
          nullable: true
        officialSite:
          type: string
          nullable: true
        rating:
          type: object
          properties:
            average:
              type: number
              nullable: true
        image:
          $ref: "#/components/schemas/ImageSet"
        summary:
          type: string
          nullable: true
    ShowSearchResult:
      type: object
      properties:
        score:
          type: number
        show:
          $ref: "#/components/schemas/Show"
    Season:
      type: object
      properties:
        tvmazeSeasonId:
          type: integer
        tvmazeShowId:
          type: integer
        number:
          type: integer
        name:
          type: string
          nullable: true
        episodeOrder:
          type: integer
          nullable: true
        premiereDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        image:
          $ref: "#/components/schemas/ImageSet"
        summary:
          type: string
          nullable: true
    Episode:
      type: object
      properties:
        tvmazeId:
          type: integer
        tvmazeShowId:
          type: integer
        name:
          type: string
        season:
          type: integer
        number:
          type: integer
        airdate:
          type: string
          nullable: true
        runtime:
          type: integer
          nullable: true
        image:
          $ref: "#/components/schemas/ImageSet"
        summary:
          type: string
          nullable: true
    CastMember:
      type: object
      properties:
        person:
          type: object
          additionalProperties: true
        character:
          type: object
          additionalProperties: true
    ImageSet:
      type: object
      properties:
        medium:
          type: string
          nullable: true
        original:
          type: string
          nullable: true
    ReviewCreate:
      type: object
      required: [tvmazeId, rating, content]
      properties:
        tvmazeId:
          type: integer
          minimum: 1
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
          nullable: true
        content:
          type: string
    ReviewCreateMultipart:
      allOf:
        - $ref: "#/components/schemas/ReviewCreate"
        - type: object
          properties:
            image:
              type: string
              format: binary
    ReviewUpdate:
      type: object
      required: [rating, content]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
          nullable: true
        content:
          type: string
    Review:
      type: object
      properties:
        id:
          type: integer
        auth_id:
          type: string
        tvmaze_id:
          type: integer
        rating:
          type: integer
        title:
          type: string
          nullable: true
        content:
          type: string
        image_url:
          type: string
          nullable: true
        likes_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ReviewEnvelope:
      allOf:
        - $ref: "#/components/schemas/MessageEnvelope"
        - type: object
          properties:
            review:
              $ref: "#/components/schemas/Review"
    CommentCreate:
      type: object
      required: [content]
      properties:
        content:
          type: string
    CommentCreateMultipart:
      allOf:
        - $ref: "#/components/schemas/CommentCreate"
        - type: object
          properties:
            image:
              type: string
              format: binary
    Comment:
      type: object
      properties:
        id:
          type: integer
        review_id:
          type: integer
        auth_id:
          type: string
        content:
          type: string
        image_url:
          type: string
          nullable: true
        likes_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ReportCreate:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType:
          type: string
          enum: [REVIEW, COMMENT, USER]
        targetId:
          type: string
        reason:
          type: string
        description:
          type: string
    NotificationCreate:
      type: object
      required: [recipientAuthId, type, title, body]
      properties:
        recipientAuthId:
          type: string
        actorAuthId:
          type: string
          nullable: true
        type:
          type: string
          maxLength: 80
        title:
          type: string
          maxLength: 140
        body:
          type: string
          maxLength: 1000
        metadata:
          type: object
          additionalProperties: true
    Notification:
      type: object
      properties:
        id:
          type: integer
        recipient_auth_id:
          type: string
        actor_auth_id:
          type: string
          nullable: true
        type:
          type: string
        title:
          type: string
        body:
          type: string
        metadata:
          type: object
          additionalProperties: true
        read:
          type: boolean
        created_at:
          type: string
          format: date-time
