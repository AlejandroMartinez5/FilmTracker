  /api/friends/requests/outgoing:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1friends~1requests~1outgoing"
  /api/friends/requests/{requestId}/accept:
    $ref: "../../docs/openapi.yaml#/paths/~1api~1friends~1requests~1{requestId}~1accept"
