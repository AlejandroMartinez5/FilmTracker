services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - FilmTrack-network

  postgres-users-library:
    image: postgres:16
    container_name: postgres-users-library
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reeltrack_users_library_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_users_library_data:/var/lib/postgresql/data
      - ./ms-users-library/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reeltrack_users_library_db"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - FilmTrack-network

  postgres-reviews:
    image: postgres:16
    container_name: postgres-reviews
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reeltrack_reviews_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_reviews_data:/var/lib/postgresql/data
      - ./ms-reviews/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reeltrack_reviews_db"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - FilmTrack-network

  postgres-friends:
    image: postgres:16
    container_name: postgres-friends
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reeltrack_friends_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_friends_data:/var/lib/postgresql/data
      - ./ms-friends/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reeltrack_friends_db"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - FilmTrack-network

  postgres-moderation:
    image: postgres:16
    container_name: postgres-moderation
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reeltrack_moderation_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_moderation_data:/var/lib/postgresql/data
      - ./ms-moderation/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reeltrack_moderation_db"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - FilmTrack-network

  postgres-notifications:
    image: postgres:16
    container_name: postgres-notifications
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reeltrack_notifications_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_notifications_data:/var/lib/postgresql/data
      - ./ms-notifications/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reeltrack_notifications_db"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    networks:
      - FilmTrack-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - FilmTrack-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  auth-service:
    build: ./ms-auth
    ports:
      - "3003:3003"
    env_file:
      - ./ms-auth/.env
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - FilmTrack-network

  user-service:
    build: ./ms-users
    ports:
      - "3002:3002"
    volumes:
      - ./ms-auth/src/keys/public.key:/app/src/keys/public.key:ro
    env_file:
      - ./ms-users/.env
    environment:
      JWT_PUBLIC_KEY_PATH: /app/src/keys/public.key
      MEDIA_GRPC_URL: media-service:50051
      MAX_IMAGE_UPLOAD_BYTES: 5242880
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
      media-service:
        condition: service_started
    networks:
      - FilmTrack-network

  show-service:
    build: ./ms-shows
    ports:
      - "3001:3001"
    env_file:
      - ./ms-shows/.env
    depends_on:
      mongo:
        condition: service_started
    networks:
      - FilmTrack-network

  users-library-service:
    build: ./ms-users-library
    ports:
      - "3004:3004"
    volumes:
      - ./ms-auth/src/keys/public.key:/app/src/keys/public.key:ro
    env_file:
      - ./ms-users-library/.env
    environment:
      JWT_PUBLIC_KEY_PATH: /app/src/keys/public.key
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres-users-library:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - FilmTrack-network

  reviews-service:
    build: ./ms-reviews
    ports:
      - "3005:3005"
    volumes:
      - ./ms-auth/src/keys/public.key:/app/src/keys/public.key:ro
    environment:
      PORT: 3005
      DATABASE_URL: postgres://postgres:postgres@postgres-reviews:5432/reeltrack_reviews_db
      JWT_PUBLIC_KEY_PATH: /app/src/keys/public.key
      REVIEW_EDIT_LIMIT_MINUTES: 30
      COMMENT_EDIT_LIMIT_MINUTES: 30
      MEDIA_GRPC_URL: media-service:50051
      MAX_IMAGE_UPLOAD_BYTES: 5242880
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres-reviews:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      media-service:
        condition: service_started
    networks:
      - FilmTrack-network

  friends-service:
    build: ./ms-friends
    ports:
      - "3006:3006"
    volumes:
      - ./ms-auth/src/keys/public.key:/app/src/keys/public.key:ro
    environment:
      PORT: 3006
      DATABASE_URL: postgresql://postgres:postgres@postgres-friends:5432/reeltrack_friends_db
      JWT_PUBLIC_KEY_PATH: /app/src/keys/public.key
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres-friends:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - FilmTrack-network

  moderation-service:
    build: ./ms-moderation
    ports:
      - "3007:3007"
    volumes:
      - ./ms-auth/src/keys/public.key:/app/src/keys/public.key:ro
    environment:
      PORT: 3007
      DATABASE_URL: postgresql://postgres:postgres@postgres-moderation:5432/reeltrack_moderation_db
      JWT_PUBLIC_KEY_PATH: /app/src/keys/public.key
      AUTH_SERVICE_URL: http://auth-service:3003/api/auth
      REVIEWS_SERVICE_URL: http://reviews-service:3005/api
      USERS_SERVICE_URL: http://user-service:3002/api/users
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      postgres-moderation:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
      reviews-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - FilmTrack-network

  notifications-service:
    build: ./ms-notifications
    ports:
      - "3008:3008"
    volumes:
      - ./ms-auth/src/keys/public.key:/app/src/keys/public.key:ro
    environment:
      PORT: 3008
      DATABASE_URL: postgresql://postgres:postgres@postgres-notifications:5432/reeltrack_notifications_db
      JWT_PUBLIC_KEY_PATH: /app/src/keys/public.key
      RABBITMQ_URL: amqp://rabbitmq:5672
      NOTIFICATIONS_RETENTION_DAYS: 30
      NOTIFICATIONS_CLEANUP_INTERVAL_HOURS: 24
    depends_on:
      postgres-notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - FilmTrack-network

  media-service:
    build: ./ms-media
    ports:
      - "50051:50051"
      - "3010:3010"
    environment:
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      HTTP_PORT: 3010
      UPLOAD_DIR: /app/uploads
      PUBLIC_BASE_URL: http://localhost:3010/media
      MAX_FILE_SIZE_BYTES: 5242880
    volumes:
      - media_uploads:/app/uploads
    networks:
      - FilmTrack-network

networks:
  FilmTrack-network:
    driver: bridge

volumes:
  postgres_users_library_data:
  postgres_reviews_data:
  postgres_friends_data:
  postgres_moderation_data:
  postgres_notifications_data:
  media_uploads:
