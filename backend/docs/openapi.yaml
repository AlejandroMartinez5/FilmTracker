      summary: Marca una notificacion como leida.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "200":
          $ref: "#/components/responses/DataResponse"
  /api/notifications/{notificationId}:
    delete:
      tags: [Notifications]
      summary: Elimina una notificacion.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/NotificationId"
