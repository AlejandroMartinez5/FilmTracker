        - bearerAuth: []
      responses:
        "200":
          description: Notificaciones actualizadas.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/MessageEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Notification"
                      updated:
                        type: integer
  /api/notifications/{notificationId}/read:
    put:
